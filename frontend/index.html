<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <title>Putzplan Bella-Wohnung</title>
    <style>
        body { font-family: sans-serif; max-width: 650px; margin: auto; padding: 1em; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1em; margin-bottom: 1em; background: #fafafa; }
        .member { display: inline-block; background: #e0e0e0; border-radius: 20px; padding: 0.3em 0.8em; margin: 0.2em; cursor: pointer; }
        .task { display: flex; align-items: center; gap: 0.5em; margin: 0.3em 0; }
        .task input { flex: 1; }
        button { padding: 0.4em 0.8em; border: none; border-radius: 4px; background: #4CAF50; color: white; cursor: pointer; }
        button:hover { opacity: 0.8; }
        button.danger { background: #d32f2f; }
        button.add { background: #388E3C; }  /* etwas dunkleres Grün für Plus */
        button.remove { background: #d32f2f; padding: 0.2em 0.6em; }
        input, select { padding: 0.4em; margin: 0.2em 0; box-sizing: border-box; }
        .hidden { display: none; }
        .room-block { margin-left: 1em; border-left: 4px solid #4CAF50; padding-left: 0.8em; margin-bottom: 0.8em; }
        .room-header { display: flex; align-items: center; gap: 0.5em; }
    </style>
</head>
<body>
    <h1>Putzplan Bella-Wohnung</h1>

    <!-- Anmeldebereich -->
    <div id="loginArea">
        <input type="text" id="usernameInput" placeholder="Benutzername">
        <input type="password" id="passwordInput" placeholder="Passwort">
        <button onclick="login()">Einloggen / Registrieren</button>
    </div>

    <!-- Hauptbereich (nach Login sichtbar) -->
    <div id="mainApp" class="hidden">
        <div class="card">
            <h3>Haushalt</h3>
            <p>Haushalt‑ID: <span id="currentHouseholdId">keine</span></p>
            <button onclick="showCreateForm()">Neuen Haushalt erstellen</button>
            <button onclick="showLoadForm()">Haushalt laden</button>
            <button onclick="assignNewWeek()" id="assignBtn" disabled>Neue Zuteilung jetzt</button>
            <button onclick="deleteCurrentHousehold()" id="deleteHouseholdBtn" class="danger" style="display:none;">Haushalt löschen</button>
        </div>

        <!-- Formular: Neuen Haushalt anlegen -->
        <div id="createForm" class="card hidden">
            <h4>Neuen Haushalt anlegen</h4>
            <input type="text" id="householdName" placeholder="Name (z.B. Bella-Wohnung)">
            <input type="text" id="additionalMembersInput" placeholder="Weitere Mitglieder (per Komma)">
            <p>Räume und Aufgaben <span style="color:gray">(optional, später bearbeitbar)</span>:</p>
            <div id="createRoomsContainer">
                <!-- dynamisch erzeugt -->
            </div>
            <button class="add" onclick="addRoomToCreate()">＋ Raum hinzufügen</button>
            <br><br>
            <button onclick="createHousehold()">Haushalt erstellen</button>
        </div>

        <!-- Formular: Haushalt laden -->
        <div id="loadForm" class="card hidden">
            <h4>Haushalt laden</h4>
            <input type="text" id="loadHouseholdId" placeholder="Haushalt-ID">
            <button onclick="loadHousehold()">Laden</button>
        </div>

        <!-- Einladungsbereich -->
        <div id="inviteArea" class="card">
            <h3>Einladung</h3>
            <p>Dein Einladungscode: <strong id="inviteCodeDisplay">wird geladen...</strong></p>
            <input type="text" id="inviteInput" placeholder="Einladungscode eines anderen Haushalts">
            <button onclick="joinByInviteCode()">Beitreten</button>
        </div>

        <!-- Mitglieder & Verwaltung -->
        <div id="membersCard" class="card hidden">
            <h3>Mitglieder</h3>
            <div id="membersList"></div>
            <input type="text" id="newMemberName" placeholder="Neuen Benutzer hinzufügen">
            <button onclick="addMember()">Hinzufügen</button>
            <button id="deleteMemberBtn" class="danger hidden" onclick="deleteSelectedMember()">Ausgewähltes entfernen</button>
        </div>
        <div class="card">
            <h3>Meine E‑Mail</h3>
            <input type="email" id="emailInput" placeholder="deine@email.de">
            <button onclick="saveEmail()">Speichern</button>
        </div>

        <!-- Räume & Aufgaben bearbeiten -->
        <div id="plansCard" class="card hidden">
            <h3>Räume & Aufgaben bearbeiten</h3>
            <div id="plansEditContainer"></div>
            <button class="add" onclick="addRoomToEdit()">＋ Raum hinzufügen</button>
            <br><br>
            <button onclick="savePlans()">Speichern</button>
        </div>


        <!-- Zuteilungen -->
        <div id="assignmentsCard" class="card hidden">
            <h3>Aktuelle Zuteilung</h3>
            <div id="assignmentsList"></div>
        </div>

        <!-- Offene Vetos -->
        <div id="vetoCard" class="card hidden">
            <h3>Offene Vetos</h3>
            <div id="vetoList"></div>
        </div>
    </div>

    <script>
        // ---------- Globale Variablen & Hilfsfunktionen ----------
        let token = localStorage.getItem('token') || '';
        let currentHouseholdId = null;
        let householdData = null;
        let ws = null;
        let editingPlans = [];  // temporär für die Bearbeitung

        function hide(id) { document.getElementById(id).classList.add('hidden'); }
        function show(id) { document.getElementById(id).classList.remove('hidden'); }

        async function apiCall(url, method='GET', body=null) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const resp = await fetch(url, {
                method,
                headers,
                body: body ? JSON.stringify(body) : null
            });
            if (resp.status === 401) {
                alert('Sitzung abgelaufen. Bitte neu einloggen.');
                localStorage.removeItem('token');
                location.reload();
            }
            return resp;
        }

        // ---------- Anmeldung ----------
        async function login() {
            const user = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value;
            if (!user || !pass) { alert('Bitte Benutzername und Passwort eingeben'); return; }
            let resp = await fetch('/token', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            if (!resp.ok) {
                resp = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });
                if (!resp.ok) { alert('Fehler bei Anmeldung/Registrierung'); return; }
                resp = await fetch('/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });
            }
            const data = await resp.json();
            token = data.access_token;
            localStorage.setItem('token', token);
            hide('loginArea');
            show('mainApp');
            const savedId = localStorage.getItem('currentHouseholdId');
            if (savedId) await loadHouseholdById(savedId);
        }

        // ---------- Haushalt erstellen / laden ----------
        function showCreateForm() { hide('loadForm'); show('createForm'); }
        function showLoadForm() { hide('createForm'); show('loadForm'); }

        // Räume im Erstellungsformular
        function addRoomToCreate() {
            const container = document.getElementById('createRoomsContainer');
            const block = document.createElement('div');
            block.className = 'room-block';
            block.innerHTML = `
                <div class="room-header">
                    <input type="text" class="roomName" placeholder="Raumname">
                    <button class="remove" onclick="this.parentElement.parentElement.remove()">−</button>
                </div>
                <div class="tasksContainer">
                    <div class="task"><input type="text" class="taskName" placeholder="Aufgabe"><button class="remove" onclick="this.parentElement.remove()">−</button></div>
                </div>
                <button class="add" onclick="addTaskToCreate(this)">＋ Aufgabe</button>
            `;
            container.appendChild(block);
        }

        function addTaskToCreate(btn) {
            const tasksContainer = btn.previousElementSibling;
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task';
            taskDiv.innerHTML = `<input type="text" class="taskName" placeholder="Aufgabe"><button class="remove" onclick="this.parentElement.remove()">−</button>`;
            tasksContainer.appendChild(taskDiv);
        }

        async function createHousehold() {
            const name = document.getElementById('householdName').value.trim() || 'Mein Haushalt';
            const additionalMembers = document.getElementById('additionalMembersInput').value.split(',').map(s => s.trim()).filter(s => s);
            const currentUser = document.getElementById('usernameInput').value.trim();
            const members = [currentUser, ...additionalMembers.filter(m => m !== currentUser)];

            const roomBlocks = document.querySelectorAll('#createRoomsContainer > .room-block');
            const cleaning_plans = [];
            roomBlocks.forEach(block => {
                const roomName = block.querySelector('.roomName').value.trim();
                const taskInputs = block.querySelectorAll('.taskName');
                const tasks = [];
                taskInputs.forEach(inp => {
                    const taskName = inp.value.trim();
                    if (taskName) tasks.push({ name: taskName, interval_weeks: 1 });
                });
                if (roomName) {
                    cleaning_plans.push({ id: roomName.toLowerCase().replace(/\s/g, '_'), name: roomName, tasks });
                }
            });

            const payload = { name, members, cleaning_plans };
            const resp = await apiCall('/households', 'POST', payload);
            if (resp.ok) {
                const h = await resp.json();
                setHousehold(h);
                hide('createForm');
            } else {
                alert('Fehler beim Erstellen');
            }
        }

        async function loadHousehold() {
            const id = document.getElementById('loadHouseholdId').value.trim();
            if (!id) return;
            await loadHouseholdById(id);
        }

        async function loadHouseholdById(id) {
            const resp = await apiCall(`/households/${id}`);
            if (resp.ok) {
                const h = await resp.json();
                setHousehold(h);
                hide('loadForm');
            } else if (resp.status === 403) {
                alert('Du bist kein Mitglied dieses Haushalts. Bitte den Besitzer bitten, dich hinzuzufügen.');
            } else {
                alert('Haushalt nicht gefunden');
            }
        }

        function setHousehold(h) {
            householdData = h;
            currentHouseholdId = h._id;
            document.getElementById('currentHouseholdId').innerText = h._id;
            localStorage.setItem('currentHouseholdId', h._id);
            document.getElementById('assignBtn').disabled = false;
            document.getElementById('inviteCodeDisplay').innerText = h.invite_code || 'nicht verfügbar';

            // Lösch‑Button anzeigen, wenn der aktuelle Benutzer der Ersteller ist
            const currentUser = document.getElementById('usernameInput').value.trim();
            const deleteBtn = document.getElementById('deleteHouseholdBtn');
            if (h.created_by === currentUser) {
                deleteBtn.style.display = 'inline-block';
            } else {
                deleteBtn.style.display = 'none';
            }

            show('membersCard');
            show('assignmentsCard');
            show('plansCard');
            renderMembers();
            renderAssignments();
            renderPlansEdit();
            renderVetos();
            connectWebSocket();
        }

        // ---------- WebSocket ----------
        function connectWebSocket() {
            if (ws) ws.close();
            ws = new WebSocket(`ws://${location.host}/ws/${currentHouseholdId}?token=${token}`);
            ws.onmessage = (e) => {
                householdData = JSON.parse(e.data);
                renderMembers();
                renderAssignments();
                renderPlansEdit();
                renderVetos();
            };
            ws.onclose = () => console.log('WebSocket geschlossen');
        }

        // ---------- Einladungscode beitreten ----------
        async function joinByInviteCode() {
            const code = document.getElementById('inviteInput').value.trim();
            if (!code) return;
            // Zuerst Infos holen
            let resp = await fetch(`/invite/${code}`);
            if (!resp.ok) {
                alert('Einladungscode nicht gefunden');
                return;
            }
            const info = await resp.json();
            if (confirm(`Möchtest du dem Haushalt "${info.name}" (Mitglieder: ${info.members.join(', ')}) beitreten?`)) {
                resp = await apiCall(`/invite/${code}/join`, 'POST');
                if (resp.ok) {
                    const h = await resp.json();
                    setHousehold(h);
                    alert('Du bist beigetreten!');
                } else {
                    alert('Beitritt fehlgeschlagen (vielleicht schon Mitglied?)');
                }
            }
        }

        // ---------- Mitglieder anzeigen & verwalten ----------
        let selectedMember = null;
        function renderMembers() {
            const list = document.getElementById('membersList');
            list.innerHTML = '';
            if (!householdData) return;
            householdData.members.forEach(m => {
                const span = document.createElement('span');
                span.className = 'member';
                span.textContent = m;
                span.onclick = () => {
                    selectedMember = m;
                    document.getElementById('deleteMemberBtn').classList.remove('hidden');
                    document.getElementById('deleteMemberBtn').innerText = `"${m}" entfernen`;
                };
                list.appendChild(span);
                list.appendChild(document.createTextNode(' '));
            });
        }

        async function addMember() {
            const nameInput = document.getElementById('newMemberName');
            const name = nameInput.value.trim();
            if (!name) return;
            // Prüfen, ob schon in der Liste
            if (householdData.members.includes(name)) {
                alert('Dieser Benutzer ist bereits Mitglied.');
                return;
            }
            // Prüfen, ob Benutzername dem aktuellen Benutzer entspricht? Nicht nötig.
            const resp = await apiCall(`/households/${currentHouseholdId}/members`, 'POST', { username: name });
            if (resp.ok) {
                nameInput.value = '';
                await loadHouseholdById(currentHouseholdId);
            } else {
                const data = await resp.json();
                alert(data.detail || 'Fehler beim Hinzufügen');
            }
        }

        async function deleteSelectedMember() {
            if (!selectedMember) return;
            if (!confirm(`Möchtest du "${selectedMember}" wirklich entfernen?`)) return;
            const resp = await apiCall(`/households/${currentHouseholdId}/members/${encodeURIComponent(selectedMember)}`, 'DELETE');
            if (resp.ok) {
                alert('Mitglied entfernt');
                await loadHouseholdById(currentHouseholdId);
                selectedMember = null;
                document.getElementById('deleteMemberBtn').classList.add('hidden');
            } else {
                alert('Fehler beim Entfernen');
            }
        }

        //Haushalt löschen//
        async function deleteCurrentHousehold() {
            if (!currentHouseholdId) return;
            if (!confirm('Möchtest du diesen Haushalt wirklich endgültig löschen? Alle Daten (Mitglieder, Putzpläne, Historie) gehen verloren.')) return;
            const resp = await apiCall(`/households/${currentHouseholdId}`, 'DELETE');
            if (resp.ok) {
                alert('Haushalt gelöscht');
                localStorage.removeItem('currentHouseholdId');
                location.reload();  // zurück zur Startseite ohne Haushalt
            } else {
                const data = await resp.json();
                alert(data.detail || 'Fehler beim Löschen');
            }
        }

        // ---------- Räume & Aufgaben bearbeiten ----------
        function renderPlansEdit() {
            const container = document.getElementById('plansEditContainer');
            container.innerHTML = '';
            if (!householdData) return;
            editingPlans = JSON.parse(JSON.stringify(householdData.cleaning_plans || []));
            editingPlans.forEach((plan, planIdx) => {
                const block = document.createElement('div');
                block.className = 'room-block';
                block.innerHTML = `
                    <div class="room-header">
                        <input type="text" class="roomName" value="${plan.name || ''}" placeholder="Raumname">
                        <button class="remove" onclick="removeRoom(${planIdx})">− Raum löschen</button>
                    </div>
                    <div class="tasksContainer">
                        ${(plan.tasks || []).map((task, taskIdx) => `
                            <div class="task">
                                <input type="text" class="taskName" value="${task.name || ''}" placeholder="Aufgabe">
                                <button class="remove" onclick="removeTask(${planIdx}, ${taskIdx})">−</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="add" onclick="addTaskToEdit(${planIdx})">＋ Aufgabe</button>
                `;
                container.appendChild(block);
            });
        }

        function addRoomToEdit() {
            editingPlans.push({ id: '', name: '', tasks: [] });
            renderPlansEdit();
        }

        function removeRoom(planIdx) {
            editingPlans.splice(planIdx, 1);
            renderPlansEdit();
        }

        function addTaskToEdit(planIdx) {
            editingPlans[planIdx].tasks.push({ name: '', interval_weeks: 1 });
            renderPlansEdit();
        }

        function removeTask(planIdx, taskIdx) {
            editingPlans[planIdx].tasks.splice(taskIdx, 1);
            renderPlansEdit();
        }

        async function savePlans() {
            const container = document.getElementById('plansEditContainer');
            const roomBlocks = container.querySelectorAll('.room-block');
            const newPlans = [];
            roomBlocks.forEach(block => {
                const nameInput = block.querySelector('.roomName');
                const roomName = nameInput ? nameInput.value.trim() : '';
                const taskInputs = block.querySelectorAll('.taskName');
                const tasks = [];
                taskInputs.forEach(inp => {
                    const taskName = inp.value.trim();
                    if (taskName) tasks.push({ name: taskName, interval_weeks: 1 });
                });
                if (roomName) {
                    const id = roomName.toLowerCase().replace(/\s/g, '_');
                    newPlans.push({ id, name: roomName, tasks });
                }
            });
            const resp = await apiCall(`/households/${currentHouseholdId}/plans`, 'PUT', { cleaning_plans: newPlans });
            if (resp.ok) {
                alert('Räume und Aufgaben gespeichert. Neue Zuteilung wird gleich berechnet.');
                await loadHouseholdById(currentHouseholdId);
            } else {
                alert('Fehler beim Speichern');
            }
        }

        // ---------- E-Mail speichern ----------
        async function saveEmail() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) return;
            const resp = await apiCall('/users/me/email', 'PUT', { email });
            if (resp.ok) alert('E‑Mail gespeichert!');
            else alert('Fehler beim Speichern');
        }

        // ---------- Zuteilungen anzeigen ----------
        function renderAssignments() {
            const container = document.getElementById('assignmentsList');
            container.innerHTML = '';
            if (!householdData || !householdData.current_week) return;
            const assignments = householdData.current_week.assignments || {};
            const plans = householdData.cleaning_plans || [];
            const taskInfo = {};
            plans.forEach(plan => {
                plan.tasks.forEach((task, idx) => {
                    taskInfo[`${plan.id}|${idx}`] = `${task.name} (${plan.name})`;
                });
            });
            for (const [user, taskIds] of Object.entries(assignments)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${user}</strong>`;
                const taskList = document.createElement('div');
                taskIds.forEach(tid => {
                    const taskDiv = document.createElement('div');
                    taskDiv.className = 'task';
                    taskDiv.innerHTML = `<span>${taskInfo[tid] || tid}</span>`;
                    const doneBtn = document.createElement('button');
                    doneBtn.textContent = 'Erledigt';
                    doneBtn.onclick = () => apiCall(`/households/${currentHouseholdId}/complete`, 'POST', { user, task_id: tid });
                    taskDiv.appendChild(doneBtn);
                    taskList.appendChild(taskDiv);
                });
                card.appendChild(taskList);
                const vetoBtn = document.createElement('button');
                vetoBtn.textContent = 'Veto einlegen';
                vetoBtn.onclick = () => apiCall(`/households/${currentHouseholdId}/veto`, 'POST', { by_user: user, accepted_by: [] });
                card.appendChild(vetoBtn);
                container.appendChild(card);
            }
        }

        function renderVetos() {
            const container = document.getElementById('vetoList');
            container.innerHTML = '';
            if (!householdData || !householdData.veto_requests || householdData.veto_requests.length === 0) {
                hide('vetoCard');
                return;
            }
            show('vetoCard');
            householdData.veto_requests.forEach(v => {
                const div = document.createElement('div');
                div.innerHTML = `<p><b>${v.by_user}</b> hat Veto eingelegt. Zugestimmt: ${v.accepted_by.join(', ') || 'niemand'}</p>`;
                const acceptBtn = document.createElement('button');
                acceptBtn.textContent = 'Zustimmen';
                acceptBtn.onclick = () => {
                    const currentUser = document.getElementById('usernameInput').value.trim();
                    apiCall(`/households/${currentHouseholdId}/veto/accept`, 'POST', { user: currentUser });
                };
                div.appendChild(acceptBtn);
                container.appendChild(div);
            });
        }

        async function assignNewWeek() {
            if (!currentHouseholdId) return;
            const resp = await apiCall(`/households/${currentHouseholdId}/assign`, 'POST');
            if (resp.ok) {
                alert('Neue Zuteilung wurde berechnet');
                await loadHouseholdById(currentHouseholdId);
            } else {
                alert('Fehler beim Anstoßen der Zuteilung');
            }
        }

        // ---------- Initial ----------
        if (token) {
            hide('loginArea');
            show('mainApp');
            const savedId = localStorage.getItem('currentHouseholdId');
            if (savedId) loadHouseholdById(savedId);
        }

        // Standardmäßig ein leeres Raum-Feld beim Erstellen
        addRoomToCreate();
    </script>
</body>
</html>
