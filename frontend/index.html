<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <title>Putzplan Bella-Wohnung</title>
    <style>
        /* gleicher Style wie zuvor, plus checkbox styling */
        body { font-family: sans-serif; max-width: 650px; margin: auto; padding: 1em; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1em; margin-bottom: 1em; background: #fafafa; }
        .member { display: inline-block; background: #e0e0e0; border-radius: 20px; padding: 0.3em 0.8em; margin: 0.2em; cursor: pointer; }
        .task { display: flex; align-items: center; gap: 0.5em; margin: 0.3em 0; }
        button { /* ... */ }
        .hidden { display: none; }
        .room-block { margin-left: 1em; border-left: 4px solid #4CAF50; padding-left: 0.8em; margin-bottom: 0.8em; }
    </style>
</head>
<body>
    <!-- ... (Login, Hauptbereich, Karten wie gehabt) ... -->
    <!-- Wichtig: Im createForm wird ein Radiobutton-Set ergänzt -->
    <div id="createForm" class="card hidden">
        <h4>Neuen Haushalt anlegen</h4>
        <input type="text" id="householdName" placeholder="Name (z.B. Bella-Wohnung)">
        <input type="text" id="additionalMembersInput" placeholder="Weitere Mitglieder (per Komma)">
        <fieldset>
            <legend>Aufteilung:</legend>
            <label><input type="radio" name="allocation" value="rooms" checked> Räume (ganze Räume werden verteilt)</label>
            <label><input type="radio" name="allocation" value="tasks"> Aufgaben (einzelne Aufgaben werden verteilt)</label>
        </fieldset>
        <div id="createRoomsContainer">...</div>
        <button class="add" onclick="addRoomToCreate()">＋ Raum hinzufügen</button>
        <br><br>
        <button onclick="createHousehold()">Haushalt erstellen</button>
    </div>

    <!-- In der Zuteilungskarte (assignmentsCard) werden jetzt Räume mit Checklisten gerendert -->
    <div id="assignmentsCard" class="card hidden">
        <h3>Aktuelle Zuteilung</h3>
        <div id="assignmentsList"></div>
    </div>
    <!-- ... andere Karten unverändert ... -->

    <script>
        // ... globale Variablen, apiCall, login, showCreateForm, addRoomToCreate, addTaskToCreate ...
        // createHousehold() liest nun allocation_mode aus
        async function createHousehold() {
            const name = document.getElementById('householdName').value.trim() || 'Mein Haushalt';
            const allocation = document.querySelector('input[name="allocation"]:checked').value;
            // ... restliche Logik ...
            const payload = { name, members, cleaning_plans, allocation_mode: allocation };
            // POST /households
        }

        // renderAssignments() völlig neu für Räume
        function renderAssignments() {
            const container = document.getElementById('assignmentsList');
            container.innerHTML = '';
            if (!householdData || !householdData.current_week) return;
            const assignments = householdData.current_week.assignments || {};
            const plans = householdData.cleaning_plans || [];
            const allocation = householdData.allocation_mode || 'rooms';

            // Für Aufgaben-Modus (alt)
            if (allocation === 'tasks') {
                // ... alter Code mit taskInfo und Erledigt-Buttons ...
                return;
            }

            // Raum-Modus: Jedem Nutzer seine Räume anzeigen
            for (const [user, planIds] of Object.entries(assignments)) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<strong>${user}</strong>`;
                const planList = document.createElement('div');
                planIds.forEach(planId => {
                    const plan = plans.find(p => p.id === planId);
                    if (!plan) return;
                    const roomDiv = document.createElement('div');
                    roomDiv.className = 'room-block';
                    roomDiv.innerHTML = `<h4>${plan.name} (alle ${plan.interval_weeks || 1} Woche(n))</h4>`;
                    const taskList = document.createElement('div');
                    let allChecked = true;
                    plan.tasks.forEach((task, idx) => {
                        const taskDiv = document.createElement('div');
                        taskDiv.className = 'task';
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.id = `task-${user}-${planId}-${idx}`;
                        // State aus localStorage? Oder wir merken uns das nur visuell
                        taskDiv.appendChild(cb);
                        const label = document.createElement('label');
                        label.htmlFor = cb.id;
                        label.textContent = task.name;
                        taskDiv.appendChild(label);
                        taskList.appendChild(taskDiv);
                    });
                    roomDiv.appendChild(taskList);
                    const doneBtn = document.createElement('button');
                    doneBtn.textContent = 'Raum erledigt';
                    doneBtn.onclick = async () => {
                        // Prüfen, ob alle Checkboxen gecheckt sind
                        const checkboxes = roomDiv.querySelectorAll('input[type="checkbox"]');
                        const allDone = Array.from(checkboxes).every(cb => cb.checked);
                        if (!allDone) {
                            alert('Bitte alle Aufgaben abhaken, bevor du den Raum als erledigt markierst.');
                            return;
                        }
                        await apiCall(`/households/${currentHouseholdId}/complete`, 'POST', { plan_id: planId, user });
                        alert('Raum als erledigt markiert!');
                        // Nach erfolgreicher Meldung den Raum aus der UI entfernen oder durchstreichen
                        roomDiv.style.opacity = '0.5';
                    };
                    roomDiv.appendChild(doneBtn);
                    planList.appendChild(roomDiv);
                });
                card.appendChild(planList);
                // Veto-Button nur für andere Nutzer (wie gehabt)
                if (user !== currentUsername) {
                    const vetoBtn = document.createElement('button');
                    vetoBtn.textContent = 'Veto einlegen';
                    vetoBtn.onclick = () => apiCall(`/households/${currentHouseholdId}/veto`, 'POST', { by_user: user, accepted_by: [] });
                    card.appendChild(vetoBtn);
                }
                container.appendChild(card);
            }
        }

        // savePlans() wie gefordert, danach assignNewWeek()
        async function savePlans() {
            const container = document.getElementById('plansEditContainer');
            const roomBlocks = container.querySelectorAll('.room-block');
            const newPlans = [];
            roomBlocks.forEach(block => {
                const nameInput = block.querySelector('.roomName');
                const roomName = nameInput ? nameInput.value.trim() : '';
                const intervalInput = block.querySelector('.roomInterval');
                const intervalWeeks = intervalInput ? parseInt(intervalInput.value) || 1 : 1;
                const taskInputs = block.querySelectorAll('.taskName');
                const tasks = [];
                taskInputs.forEach(inp => {
                    const taskName = inp.value.trim();
                    if (taskName) tasks.push({ name: taskName });
                });
                if (roomName) {
                    const id = roomName.toLowerCase().replace(/\s/g, '_');
                    newPlans.push({ id, name: roomName, tasks, interval_weeks: intervalWeeks });
                }
            });
            const resp = await apiCall(`/households/${currentHouseholdId}/plans`, 'PUT', { cleaning_plans: newPlans });
            if (resp.ok) {
                alert('Räume und Aufgaben gespeichert. Neue Zuteilung wird berechnet.');
                await loadHouseholdById(currentHouseholdId);
                // Automatisch neue Zuteilung holen
                await assignNewWeek();
            } else {
                alert('Fehler beim Speichern');
            }
        }
    </script>
</body>
</html>
