name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Wait for MongoDB
        run: |
          sudo apt-get update && sudo apt-get install -y netcat-openbsd
          echo "Warte auf MongoDB..."
          for i in {1..30}; do
            if nc -z localhost 27017; then
              echo "MongoDB ist bereit."
              break
            fi
            echo "Noch nicht bereit, warte 2s..."
            sleep 2
          done
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests with retry
        env:
          MONGO_URI: mongodb://localhost:27017/?serverSelectionTimeoutMS=3000
        run: |
          pytest tests/ --maxfail=5 --reruns 2 --reruns-delay 5 || pytest tests/ --last-failed --last-failed-no-failures none